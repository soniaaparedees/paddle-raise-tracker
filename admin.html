<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paddle Raise — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --gold:#8B5E0A; --gold-bg:#FDF3DC; --gold-bd:#D97706;
  --ink:#111; --bg:#F4F2EE; --border:#D6D0C4; --muted:#6B6355; --white:#fff;
  --l1:#B45309; --l1-bg:#FEF3C7; --l1-bd:#FCD34D;
  --l2:#1D4ED8; --l2-bg:#DBEAFE; --l2-bd:#93C5FD;
  --l3:#B91C1C; --l3-bg:#FEE2E2; --l3-bd:#FCA5A5;
  --l4:#047857; --l4-bg:#D1FAE5; --l4-bd:#6EE7B7;
  --l5:#6D28D9; --l5-bg:#EDE9FE; --l5-bd:#C4B5FD;
  --l6:#0F766E; --l6-bg:#CCFBF1; --l6-bd:#5EEAD4;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { min-height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); }

/* LOGIN */
.login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:500; padding:16px; }
.login-overlay.hidden { display:none; }
.login-card { background:var(--white); border:2px solid var(--border); border-radius:16px; padding:32px 28px; width:100%; max-width:380px; box-shadow:0 12px 48px rgba(0,0,0,.12); }
.login-card h1 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); margin-bottom:4px; }
.login-card p { font-size:.88rem; color:var(--muted); margin-bottom:24px; }
.login-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.13em; font-weight:700; color:var(--muted); margin-bottom:5px; display:block; }
.login-input { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:1rem; color:var(--ink); margin-bottom:14px; -webkit-appearance:none; }
.login-input:focus { outline:none; border-color:#6B7280; }
.login-btn { width:100%; padding:13px; background:var(--ink); color:#fff; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; -webkit-appearance:none; }
.login-btn:disabled { background:#9CA3AF; }
.login-err { font-size:.82rem; margin-top:10px; text-align:center; min-height:18px; line-height:1.4; }

/* TOP BAR */
.top-bar { background:var(--white); border-bottom:2px solid var(--border); padding:0 16px; height:52px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 6px rgba(0,0,0,.07); flex-shrink:0; position:sticky; top:0; z-index:100; }
.top-bar-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:900; color:var(--gold); flex:1; }
.live-badge { display:flex; align-items:center; gap:5px; background:#ECFDF5; border:1px solid #6EE7B7; border-radius:20px; padding:3px 10px; flex-shrink:0; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#047857; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.live-label { font-size:.7rem; color:#047857; font-weight:700; }
.signout-btn { font-family:'DM Mono',monospace; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:6px 12px; border:1.5px solid var(--border); border-radius:7px; background:var(--white); color:var(--muted); cursor:pointer; }

/* PAGE SYSTEM */
.page { display:none; flex-direction:column; min-height:calc(100vh - 52px); }
.page.active { display:flex; flex-direction:column; }

/* ═══════════════════ LIST PAGE ═══════════════════ */
.list-toolbar { background:var(--white); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; flex-shrink:0; }
.export-all-btn { font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:700; padding:8px 16px; border:2px solid #047857; border-radius:8px; background:#047857; color:#fff; cursor:pointer; display:flex; align-items:center; gap:6px; -webkit-appearance:none; }
.session-count { font-size:.78rem; color:var(--muted); }

/* Location upload banner */
.locmap-banner {
  background:#EFF6FF; border:1.5px solid #BFDBFE; border-radius:10px;
  padding:12px 16px; margin:12px 16px 0; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.locmap-banner.uploaded { background:#ECFDF5; border-color:#6EE7B7; }
.locmap-banner-text { flex:1; min-width:0; }
.locmap-banner-title { font-size:.85rem; font-weight:700; color:var(--ink); }
.locmap-banner-sub { font-size:.75rem; color:var(--muted); margin-top:2px; }
.upload-csv-btn {
  font-family:'DM Mono',monospace; font-size:.7rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em; padding:7px 14px;
  border:1.5px solid #1D4ED8; border-radius:7px; background:#DBEAFE; color:#1D4ED8;
  cursor:pointer; flex-shrink:0; -webkit-appearance:none;
}
#locmap-file-input { display:none; }

/* Location filter tabs */
.loc-tabs { display:flex; gap:8px; padding:12px 16px 0; flex-wrap:wrap; }
.loc-tab { padding:8px 14px; border-radius:9px; border:2px solid var(--border); background:var(--white); font-family:'DM Sans',monospace; font-size:.78rem; font-weight:700; cursor:pointer; text-align:center; color:var(--muted); transition:all .15s; -webkit-appearance:none; white-space:nowrap; }
.loc-tab.active { background:var(--ink); border-color:var(--ink); color:#fff; }

/* Sessions list */
.sessions-area { flex:1; padding:12px 16px 32px; display:flex; flex-direction:column; gap:8px; }
.no-sessions { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:10px; color:var(--muted); text-align:center; }
.no-sessions .icon { font-size:2.5rem; }
.no-sessions p { font-size:.9rem; }

.session-card { background:var(--white); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.05); display:flex; align-items:stretch; cursor:pointer; transition:box-shadow .15s, transform .1s; -webkit-tap-highlight-color:transparent; }
.session-card:active { transform:scale(.99); box-shadow:0 2px 8px rgba(0,0,0,.1); }
.session-card-left { flex:1; padding:14px 16px; display:flex; flex-direction:column; gap:4px; min-width:0; }
.session-card-name { font-size:1.05rem; font-weight:700; color:var(--ink); }
.session-card-meta { font-size:.72rem; color:var(--muted); }
.session-card-right { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:14px 16px; border-left:1.5px solid var(--border); gap:4px; background:#FAFAF8; flex-shrink:0; }
.session-card-total { font-family:'DM Mono',monospace; font-size:1.25rem; font-weight:900; color:var(--gold); white-space:nowrap; }
.session-card-arrow { font-size:.85rem; color:var(--muted); }

/* ═══════════════════ DETAIL PAGE ═══════════════════ */
.detail-header { background:var(--white); border-bottom:2px solid var(--border); padding:8px 16px; min-height:52px; display:flex; align-items:center; gap:12px; flex-shrink:0; flex-wrap:wrap; }
.back-btn { font-family:'DM Mono',monospace; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; padding:7px 14px; border:1.5px solid var(--border); border-radius:8px; background:var(--white); color:var(--ink); cursor:pointer; display:flex; align-items:center; gap:6px; flex-shrink:0; }
.detail-header-info { flex:1; min-width:0; }
.detail-name { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:900; color:var(--ink); }
.detail-meta { font-size:.72rem; color:var(--muted); margin-top:2px; }
.detail-header-actions { display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }
.export-btn { font-family:'DM Mono',monospace; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:7px 14px; border:1.5px solid #047857; border-radius:8px; background:#D1FAE5; color:#047857; cursor:pointer; }
.delete-btn { font-family:'DM Mono',monospace; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:7px 14px; border:1.5px solid #FCA5A5; border-radius:8px; background:#FEF2F2; color:#B91C1C; cursor:pointer; }

.detail-total-hero { background:var(--gold-bg); border-bottom:2px solid var(--gold-bd); padding:20px 16px; text-align:center; flex-shrink:0; }
.detail-total-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.16em; color:var(--gold); font-weight:700; margin-bottom:4px; }
.detail-total-val { font-family:'DM Mono',monospace; font-size:2.8rem; font-weight:900; color:var(--gold); line-height:1; }
.detail-paddle-count { font-size:.78rem; color:var(--muted); margin-top:6px; font-weight:500; }

/* Detail location tabs — dynamic */
.detail-loc-tabs { display:flex; border-bottom:1.5px solid var(--border); flex-shrink:0; background:var(--bg); overflow-x:auto; }
.detail-loc-tab { padding:9px 16px; font-family:'DM Mono',monospace; font-size:.75rem; font-weight:700; text-align:center; cursor:pointer; color:var(--muted); border-bottom:3px solid transparent; margin-bottom:-1.5px; background:none; border-top:none; border-left:none; border-right:none; transition:all .12s; white-space:nowrap; }
.detail-loc-tab.active { color:var(--ink); border-bottom-color:var(--ink); background:var(--white); }
.loc-tab-sub { font-family:'DM Mono',monospace; font-size:.65rem; font-weight:700; color:var(--gold); background:var(--gold-bg); border:1px solid var(--gold-bd); border-radius:4px; padding:1px 6px; margin-left:6px; vertical-align:middle; }

.detail-levels { flex:1; overflow-y:auto; padding-bottom:32px; }
.detail-level-row { padding:10px 16px; border-bottom:1px solid #F0EDE8; border-left:4px solid transparent; }
.detail-level-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.detail-level-name { display:flex; align-items:center; gap:8px; font-size:.95rem; font-weight:700; }
.detail-level-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.detail-level-sub { font-family:'DM Mono',monospace; font-size:.95rem; font-weight:700; }
.detail-chips { display:flex; flex-wrap:wrap; gap:4px; }
.chip { font-family:'DM Mono',monospace; font-size:.78rem; font-weight:600; padding:3px 8px; border-radius:4px; border:1px solid transparent; line-height:1.5; cursor:default; }
.chip.empty-chip { color:#9CA3AF; font-style:italic; background:none!important; border:none!important; }
.chip.voided { opacity:.4; text-decoration:line-through; }
.chip-lc{background:#FCE7F3;color:#9D174D;border-color:#F9A8D4;}
.chip-l1{background:var(--l1-bg);color:var(--l1);border-color:var(--l1-bd);}
.chip-l2{background:var(--l2-bg);color:var(--l2);border-color:var(--l2-bd);}
.chip-l3{background:var(--l3-bg);color:var(--l3);border-color:var(--l3-bd);}
.chip-l4{background:var(--l4-bg);color:var(--l4);border-color:var(--l4-bd);}
.chip-l5{background:var(--l5-bg);color:var(--l5);border-color:var(--l5-bd);}
.chip-l6{background:var(--l6-bg);color:var(--l6);border-color:var(--l6-bd);}

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:400; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.show { display:flex; }
.modal-card { background:var(--white); border:1.5px solid var(--border); border-radius:14px; padding:28px 24px; width:100%; max-width:340px; box-shadow:0 16px 48px rgba(0,0,0,.18); text-align:center; }
.modal-card h3 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--ink); margin-bottom:8px; }
.modal-card p { font-size:.88rem; color:var(--muted); margin-bottom:24px; line-height:1.5; }
.modal-btns { display:flex; gap:10px; }
.modal-btns button { flex:1; padding:11px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:700; cursor:pointer; border:1.5px solid var(--border); background:var(--white); color:var(--ink); }
.modal-confirm { background:#FEF2F2!important; border-color:#FCA5A5!important; color:#B91C1C!important; }

/* TOAST */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:#fff; border-radius:8px; padding:10px 18px; font-size:.85rem; font-weight:500; box-shadow:0 6px 24px rgba(0,0,0,.22); z-index:999; transition:transform .22s ease; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

@media (min-width:640px) {
  .sessions-area { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); align-content:start; }
  .no-sessions { grid-column:1/-1; }
}
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <h1>🔐 Admin Login</h1>
    <p>Sign in to view and manage live sessions.</p>
    <label class="login-label">Email</label>
    <input class="login-input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
    <label class="login-label">Password</label>
    <input class="login-input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="top-bar" id="main-top-bar" style="display:none">
  <span class="top-bar-title" id="top-bar-title">🏆 Paddle Raise</span>
  <div class="live-badge"><div class="live-dot"></div><span class="live-label">Live</span></div>
  <button class="signout-btn" onclick="doSignOut()">Sign Out</button>
</div>

<!-- LIST PAGE -->
<div class="page" id="page-list">
  <div class="list-toolbar">
    <button class="export-all-btn" onclick="exportAll()">⬇ Export All CSV</button>
    <span class="session-count" id="session-count">0 sessions</span>
    <span id="fb-debug" style="font-family:DM Mono,monospace;font-size:.65rem;color:#6B6355;margin-left:auto;"></span>
  </div>

  <!-- Location map upload banner -->
  <div class="locmap-banner" id="locmap-banner">
    <div class="locmap-banner-text">
      <div class="locmap-banner-title" id="locmap-title">📍 No location map uploaded</div>
      <div class="locmap-banner-sub" id="locmap-sub">Upload a CSV with columns: paddle, location — to enable location filtering</div>
    </div>
    <button class="upload-csv-btn" onclick="document.getElementById('locmap-file-input').click()">Upload CSV</button>
    <input type="file" id="locmap-file-input" accept=".csv" onchange="handleLocMapUpload(event)">
  </div>

  <!-- Dynamic location filter tabs -->
  <div class="loc-tabs" id="loc-tabs">
    <button class="loc-tab active" id="tab-all" onclick="setLocFilter('all')">All Sessions</button>
  </div>

  <div class="sessions-area" id="sessions-area">
    <div class="no-sessions" id="no-sessions">
      <div class="icon">📋</div>
      <p>No active sessions yet.</p>
    </div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div class="page" id="page-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="detail-header-info">
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
    <div class="detail-header-actions">
      <button class="export-btn" id="detail-export-btn">⬇ CSV</button>
      <button class="delete-btn" id="detail-delete-btn">🗑 Delete</button>
    </div>
  </div>
  <div class="detail-total-hero">
    <div class="detail-total-label">Total Raised</div>
    <div class="detail-total-val" id="detail-total-val">$0</div>
    <div class="detail-paddle-count" id="detail-paddle-count"></div>
  </div>
  <div class="detail-loc-tabs" id="detail-loc-tabs"></div>
  <div class="detail-levels" id="detail-levels"></div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal-card">
    <h3>Delete Session?</h3>
    <p>This will permanently remove <strong id="delete-modal-name"></strong>'s session.</p>
    <div class="modal-btns">
      <button onclick="closeDeleteModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
// ════════════════════════════
// FIREBASE CONFIG
// ════════════════════════════
var firebaseConfig = {
  apiKey:            "AIzaSyC3-7fk-G7mSA9DSdfR217uVdDsWuk-2n4",
  authDomain:        "paddle-raise-tracker.firebaseapp.com",
  databaseURL:       "https://paddle-raise-tracker-default-rtdb.firebaseio.com",
  projectId:         "paddle-raise-tracker",
  storageBucket:     "paddle-raise-tracker.firebasestorage.app",
  messagingSenderId: "238911011317",
  appId:             "1:238911011317:web:4f5b306447b5abb28dc8bc"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db   = firebase.database();

// ════════════════════════════
// CONSTANTS
// ════════════════════════════
var LEVELS = [
  { id:'lc', label:'Custom $', value:null },
  { id:'l1', label:'$10,000', value:10000 },
  { id:'l2', label:'$5,000',  value:5000  },
  { id:'l3', label:'$2,500',  value:2500  },
  { id:'l4', label:'$1,000',  value:1000  },
  { id:'l5', label:'$500',    value:500   },
  { id:'l6', label:'$250',    value:250   },
];
var HEX = {
  lc:{ c:'#9D174D', bg:'#FCE7F3', bd:'#F9A8D4' },
  l1:{ c:'#B45309', bg:'#FEF3C7', bd:'#FCD34D' },
  l2:{ c:'#1D4ED8', bg:'#DBEAFE', bd:'#93C5FD' },
  l3:{ c:'#B91C1C', bg:'#FEE2E2', bd:'#FCA5A5' },
  l4:{ c:'#047857', bg:'#D1FAE5', bd:'#6EE7B7' },
  l5:{ c:'#6D28D9', bg:'#EDE9FE', bd:'#C4B5FD' },
  l6:{ c:'#0F766E', bg:'#CCFBF1', bd:'#5EEAD4' },
};

// ════════════════════════════
// STATE
// ════════════════════════════
var allSessions   = {};
var paddleLocMap  = {};   // { "101":"Ballroom", "102":"Lobby", ... }
var locNames      = [];   // unique location names from CSV
var locFilter     = 'all';
var detailFilter  = 'all';
var currentSid    = null;

// ════════════════════════════
// AUTH
// ════════════════════════════
auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('main-top-bar').style.display = 'flex';
    showPage('list');
    startListening();
    loadLocMap();
  } else {
    document.getElementById('login-overlay').classList.remove('hidden');
    document.getElementById('main-top-bar').style.display = 'none';
    showPage(null);
    var btn = document.getElementById('login-btn');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});

function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass  = document.getElementById('login-password').value;
  var err   = document.getElementById('login-err');
  var btn   = document.getElementById('login-btn');
  if (!email || !pass) { err.style.color='#B91C1C'; err.textContent='Please enter your email and password.'; return; }
  err.style.color='#047857'; err.textContent='⏳ Signing in…';
  btn.textContent='Signing in…'; btn.disabled=true;
  auth.signInWithEmailAndPassword(email, pass)
    .then(function() { err.textContent=''; })
    .catch(function(e) {
      btn.textContent='Sign In'; btn.disabled=false;
      var msgs = { 'auth/invalid-email':'Invalid email.','auth/user-not-found':'No account found.',
        'auth/wrong-password':'Incorrect password.','auth/invalid-credential':'Incorrect email or password.',
        'auth/too-many-requests':'Too many attempts.','auth/operation-not-allowed':'Email/Password not enabled.' };
      err.style.color='#B91C1C';
      err.textContent = msgs[e.code] || ('Error ['+e.code+']: '+e.message);
    });
}
function doSignOut() { auth.signOut(); }
document.getElementById('login-password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('login-email').addEventListener('keydown',    function(e){ if(e.key==='Enter') doLogin(); });

// ════════════════════════════
// LOCATION MAP
// ════════════════════════════
function loadLocMap() {
  db.ref('locmap').on('value', function(snap) {
    paddleLocMap = snap.val() || {};
    locNames = [];
    var seen = {};
    Object.values(paddleLocMap).forEach(function(loc) {
      if (loc && !seen[loc]) { seen[loc]=true; locNames.push(loc); }
    });
    locNames.sort();
    updateLocBanner();
    rebuildLocTabs();
    renderListPage();
    if (currentSid) renderDetailPage(currentSid);
  });
}

function updateLocBanner() {
  var banner = document.getElementById('locmap-banner');
  var title  = document.getElementById('locmap-title');
  var sub    = document.getElementById('locmap-sub');
  if (locNames.length > 0) {
    banner.classList.add('uploaded');
    title.textContent = '✅ Location map active — '+Object.keys(paddleLocMap).length+' paddles mapped';
    sub.textContent   = 'Locations: '+locNames.join(', ');
  } else {
    banner.classList.remove('uploaded');
    title.textContent = '📍 No location map uploaded';
    sub.textContent   = 'Upload a CSV with columns: paddle, location';
  }
}

function rebuildLocTabs() {
  var bar = document.getElementById('loc-tabs');
  bar.innerHTML = '';
  var allTab = document.createElement('button');
  allTab.className = 'loc-tab' + (locFilter==='all'?' active':'');
  allTab.id = 'tab-all';
  allTab.textContent = 'All Sessions';
  allTab.onclick = function(){ setLocFilter('all'); };
  bar.appendChild(allTab);
  locNames.forEach(function(name) {
    var btn = document.createElement('button');
    btn.className = 'loc-tab' + (locFilter===name?' active':'');
    btn.textContent = name;
    btn.onclick = function(){ setLocFilter(name); };
    bar.appendChild(btn);
  });
}

function handleLocMapUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
    // Skip header row if it contains non-numeric first column
    var startIdx = 0;
    if (lines.length > 0) {
      var first = lines[0].split(',')[0].replace(/"/g,'').trim();
      if (isNaN(parseInt(first))) startIdx = 1;
    }
    var map = {};
    for (var i=startIdx; i<lines.length; i++) {
      var cols = lines[i].split(',').map(function(c){ return c.replace(/^["']|["']$/g,'').trim(); });
      var paddle = parseInt(cols[0]);
      var loc    = cols[1] || '';
      if (paddle && loc) map[paddle] = loc;
    }
    if (Object.keys(map).length === 0) { showToast('No valid rows found. Check CSV format.'); return; }
    db.ref('locmap').set(map)
      .then(function(){ showToast('Location map uploaded — '+Object.keys(map).length+' paddles mapped!'); })
      .catch(function(err){ showToast('Upload failed: '+err.message); });
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ════════════════════════════
// PAGE ROUTING
// ════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  if (name) document.getElementById('page-'+name).classList.add('active');
}
function openSession(sid) {
  currentSid = sid; detailFilter = 'all';
  renderDetailPage(sid);
  showPage('detail');
  document.getElementById('top-bar-title').textContent = '← Sessions';
}
function goBack() {
  currentSid = null;
  showPage('list');
  document.getElementById('top-bar-title').textContent = '🏆 Paddle Raise';
}

// ════════════════════════════
// LIVE DATA
// ════════════════════════════
function startListening() {
  console.log('[Admin] Starting listener on sessions/');
  var dbg = document.getElementById('fb-debug');
  if(dbg) dbg.textContent = '⏳ Connecting…';

  db.ref('sessions').on('value', function(snap) {
    var keys = snap.val() ? Object.keys(snap.val()) : [];
    console.log('[Admin] sessions snapshot — ' + keys.length + ' sessions:', keys);
    if(dbg) dbg.textContent = '✅ Firebase live — ' + keys.length + ' session(s) in DB';
    allSessions = snap.val() || {};
    renderListPage();
    if (currentSid && allSessions[currentSid]) renderDetailPage(currentSid);
  }, function(err) {
    console.error('[Admin] sessions listener error:', err.code, err.message);
    if(dbg) dbg.textContent = '⚠ DB read error: ' + err.code;
    showToast('⚠ Cannot read sessions: ' + err.message);
  });
}

function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  return Object.keys(val).sort(function(a,b){ return Number(a)-Number(b); }).map(function(k){ return val[k]; });
}

function getPaddleLoc(num) { return paddleLocMap[num] || paddleLocMap[String(num)] || null; }

function calcTotal(session, filterName) {
  var log = toArray(session.log);
  var t = 0;
  log.forEach(function(e) {
    if (e.voided) return;
    if (filterName && filterName !== 'all') {
      var loc = getPaddleLoc(e.num);
      if (loc !== filterName) return;
    }
    if (e.levelId === 'lc') t += (e.customValue || 0);
    else { var lvl=LEVELS.find(function(l){return l.id===e.levelId;}); if(lvl&&lvl.value) t+=lvl.value; }
  });
  return t;
}

// ════════════════════════════
// LIST PAGE
// ════════════════════════════
function setLocFilter(name) {
  locFilter = name;
  document.querySelectorAll('.loc-tab').forEach(function(t){ t.classList.remove('active'); });
  var allSids = Object.keys(allSessions);
  // Find tab and activate
  var bar = document.getElementById('loc-tabs');
  Array.from(bar.children).forEach(function(btn){
    if ((name==='all' && btn.id==='tab-all') || btn.textContent===name) btn.classList.add('active');
  });
  renderListPage();
}

function renderListPage() {
  var allSids = Object.keys(allSessions);

  // Filter by location only when a specific location is selected
  var visible = allSids.filter(function(sid) {
    if (locFilter === 'all') return true; // always show all sessions on "All" tab
    var log = toArray(allSessions[sid].log);
    return log.some(function(e){ return !e.voided && getPaddleLoc(e.num) === locFilter; });
  });

  visible.sort(function(a,b) {
    return calcTotal(allSessions[b], locFilter) - calcTotal(allSessions[a], locFilter);
  });

  document.getElementById('session-count').textContent = visible.length+' session'+(visible.length!==1?'s':'');

  var area = document.getElementById('sessions-area');
  area.querySelectorAll('.session-card').forEach(function(el){ el.remove(); });
  var none = document.getElementById('no-sessions');
  if (visible.length === 0) { none.style.display='flex'; return; }
  none.style.display = 'none';

  visible.forEach(function(sid) {
    var session  = allSessions[sid];
    if (!session) return; // skip malformed entries
    var meta     = session.meta || {};
    var operator = meta.operator || meta.name || 'Unknown'; // fallback
    var total    = calcTotal(session, locFilter);
    var startedAt = meta.startedAt ? new Date(meta.startedAt).toLocaleString('en-US',{
      month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:true
    }) : '—';

    var card = document.createElement('div');
    card.className = 'session-card';
    card.innerHTML =
      '<div class="session-card-left">' +
        '<div class="session-card-name">'+escHtml(operator)+'</div>' +
        '<div class="session-card-meta">'+startedAt+'</div>' +
      '</div>' +
      '<div class="session-card-right">' +
        '<div class="session-card-total">$'+total.toLocaleString()+'</div>' +
        '<div class="session-card-arrow">→</div>' +
      '</div>';
    card.addEventListener('click', function(){ openSession(sid); });
    area.appendChild(card);
  });
}

// ════════════════════════════
// DETAIL PAGE
// ════════════════════════════
function renderDetailPage(sid) {
  var session  = allSessions[sid]; if(!session) return;
  var meta     = session.meta || {};
  var log      = toArray(session.log);
  log.forEach(function(e){ if(e.ts) e.ts=new Date(e.ts); });
  var total    = calcTotal(session, 'all');
  var active   = log.filter(function(e){return !e.voided;});
  var raised   = new Set(active.map(function(e){return e.num;}));
  var startedAt = meta.startedAt ? new Date(meta.startedAt).toLocaleString('en-US',{
    month:'long', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:true
  }) : '—';

  document.getElementById('detail-name').textContent = meta.operator || meta.name || 'Unknown';
  document.getElementById('detail-meta').textContent = 'Started '+startedAt;
  document.getElementById('detail-total-val').textContent = '$'+total.toLocaleString();
  document.getElementById('detail-paddle-count').textContent = raised.size+' paddle'+(raised.size!==1?'s':'')+' raised';

  // Build dynamic location tabs
  buildDetailLocTabs(sid);

  document.getElementById('detail-export-btn').onclick = function(){ exportSession(sid); };
  document.getElementById('detail-delete-btn').onclick = function(){ openDeleteModal(sid); };

  renderDetailLevels(sid);
}

function buildDetailLocTabs(sid) {
  var tabsEl  = document.getElementById('detail-loc-tabs');
  tabsEl.innerHTML = '';
  var session = allSessions[sid];

  // "All" tab — no subtotal badge (full total is shown in hero)
  var allBtn = document.createElement('button');
  allBtn.className = 'detail-loc-tab' + (detailFilter==='all'?' active':'');
  allBtn.textContent = 'All';
  allBtn.onclick = function(){ setDetailFilter('all'); };
  tabsEl.appendChild(allBtn);

  if (locNames.length > 0) {
    locNames.forEach(function(name) {
      var locTotal = session ? calcTotal(session, name) : 0;
      var btn = document.createElement('button');
      btn.className = 'detail-loc-tab' + (detailFilter===name?' active':'');
      btn.id = 'dtab-' + name.replace(/\s+/g,'_');
      btn.innerHTML = escHtml(name) +
        (locTotal > 0 ? '<span class="loc-tab-sub">$'+locTotal.toLocaleString()+'</span>' : '');
      btn.onclick = function(){ setDetailFilter(name); };
      tabsEl.appendChild(btn);
    });
    tabsEl.style.display = 'flex';
  } else {
    tabsEl.style.display = 'none';
  }
}

function setDetailFilter(name) {
  detailFilter = name;
  document.querySelectorAll('.detail-loc-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.detail-loc-tab').forEach(function(t){
    if ((name==='all'&&t.textContent==='All')||(t.textContent===name)) t.classList.add('active');
  });
  if (currentSid) renderDetailLevels(currentSid);
}

function renderDetailLevels(sid) {
  var session  = allSessions[sid]; if(!session) return;
  var log      = toArray(session.log);
  log.forEach(function(e){ if(e.ts&&!(e.ts instanceof Date)) e.ts=new Date(e.ts); });
  var container = document.getElementById('detail-levels');
  container.innerHTML = '';

  LEVELS.forEach(function(lvl) {
    var h = HEX[lvl.id];
    var entries = log.filter(function(e){
      if (e.levelId !== lvl.id) return false;
      if (detailFilter !== 'all' && locNames.length > 0) {
        return getPaddleLoc(e.num) === detailFilter;
      }
      return true;
    });
    var active  = entries.filter(function(e){ return !e.voided; });
    var subtotal = lvl.id==='lc'
      ? active.reduce(function(s,e){return s+(e.customValue||0);},0)
      : active.length*(lvl.value||0);

    var chips = entries.length===0
      ? '<span class="chip empty-chip">none</span>'
      : entries.map(function(e){
          var label = lvl.id==='lc' ? e.num+' $'+(e.customValue||0).toLocaleString() : e.num;
          var locTag = getPaddleLoc(e.num) ? ' <span style="font-size:.62rem;opacity:.6;">['+getPaddleLoc(e.num)+']</span>' : '';
          return '<span class="chip chip-'+lvl.id+(e.voided?' voided':'')+'">'+label+locTag+'</span>';
        }).join('');

    var row = document.createElement('div');
    row.className = 'detail-level-row'; row.style.borderLeftColor = h.c;
    row.innerHTML =
      '<div class="detail-level-head">' +
        '<div class="detail-level-name"><div class="detail-level-dot" style="background:'+h.c+'"></div><span style="color:'+h.c+'">'+lvl.label+'</span></div>' +
        '<div class="detail-level-sub" style="color:'+h.c+'">'+(subtotal>0?'$'+subtotal.toLocaleString():'—')+'</div>' +
      '</div><div class="detail-chips">'+chips+'</div>';
    container.appendChild(row);
  });

  // Update tab subtotals to stay current with live data
  if (locNames.length > 0 && allSessions[sid]) {
    locNames.forEach(function(name) {
      var locTotal = calcTotal(allSessions[sid], name);
      var tabId = 'dtab-' + name.replace(/\s+/g,'_');
      var tab = document.getElementById(tabId);
      if (tab) {
        var badge = tab.querySelector('.loc-tab-sub');
        if (locTotal > 0) {
          if (badge) { badge.textContent = '$'+locTotal.toLocaleString(); }
          else { tab.innerHTML = escHtml(name)+'<span class="loc-tab-sub">$'+locTotal.toLocaleString()+'</span>'; tab.onclick = function(){ setDetailFilter(name); }; }
        }
      }
    });
  }
}

// ════════════════════════════
// DELETE
// ════════════════════════════
var pendingDeleteSid = null;
function openDeleteModal(sid) {
  pendingDeleteSid = sid;
  var name = (allSessions[sid]&&allSessions[sid].meta) ? (allSessions[sid].meta.operator||allSessions[sid].meta.name||'Unknown') : 'Unknown';
  document.getElementById('delete-modal-name').textContent = name;
  document.getElementById('delete-modal').classList.add('show');
}
function closeDeleteModal() { pendingDeleteSid=null; document.getElementById('delete-modal').classList.remove('show'); }
document.getElementById('delete-modal').addEventListener('click', function(e){ if(e.target===this) closeDeleteModal(); });
function confirmDelete() {
  if (!pendingDeleteSid) return;
  var sid  = pendingDeleteSid;
  var name = (allSessions[sid]&&allSessions[sid].meta) ? (allSessions[sid].meta.operator||allSessions[sid].meta.name||'session') : 'session';
  closeDeleteModal();
  db.ref('sessions/'+sid).remove()
    .then(function(){ showToast(name+"'s session deleted."); if(currentSid===sid) goBack(); })
    .catch(function(err){ showToast('Delete failed: '+err.message); });
}

// ════════════════════════════
// EXPORT
// ════════════════════════════
function exportSession(sid) {
  var session=allSessions[sid]; if(!session)return;
  var meta=session.meta||{};
  var log=toArray(session.log);
  var rows=[['Operator','Paddle Number','Location','Level','Amount','Timestamp','Status']];
  log.forEach(function(e){
    var lvl=LEVELS.find(function(l){return l.id===e.levelId;});
    var ts=e.ts?new Date(e.ts).toLocaleString():'';
    var amount=e.levelId==='lc'?(e.customValue||0):(lvl?lvl.value:'');
    var label=e.levelId==='lc'?'Custom $'+(e.customValue||0).toLocaleString():(lvl?lvl.label:'');
    var loc=getPaddleLoc(e.num)||'';
    rows.push([meta.operator||meta.name||'',e.num,loc,label,amount,ts,e.voided?'Removed':'Active']);
  });
  triggerCSV(rows,'paddle_raise_'+(meta.operator||meta.name||'session').replace(/\s+/g,'_')+'_'+datestamp()+'.csv');
  showToast('CSV exported!');
}
function exportAll() {
  var rows=[['Session ID','Operator','Paddle Number','Location','Level','Amount','Timestamp','Status']];
  Object.keys(allSessions).forEach(function(sid){
    var s=allSessions[sid]; var meta=s.meta||{}; var log=toArray(s.log);
    log.forEach(function(e){
      var lvl=LEVELS.find(function(l){return l.id===e.levelId;});
      var ts=e.ts?new Date(e.ts).toLocaleString():'';
      var amount=e.levelId==='lc'?(e.customValue||0):(lvl?lvl.value:'');
      var label=e.levelId==='lc'?'Custom $'+(e.customValue||0).toLocaleString():(lvl?lvl.label:'');
      var loc=getPaddleLoc(e.num)||'';
      rows.push([sid,meta.operator||meta.name||'',e.num,loc,label,amount,ts,e.voided?'Removed':'Active']);
    });
  });
  if(rows.length===1){showToast('No data to export.');return;}
  triggerCSV(rows,'paddle_raise_all_'+datestamp()+'.csv');
  showToast('All sessions exported!');
}
function triggerCSV(rows,filename){
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}
function datestamp(){var n=new Date();return n.getFullYear()+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0');}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var toastTimer=null;
function showToast(msg){
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast').classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){document.getElementById('toast').classList.remove('show');},3500);
}
</script>
