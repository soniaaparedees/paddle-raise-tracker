<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paddle Raise Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#8B5E0A; --gold-bg:#FDF3DC; --gold-bd:#D97706;
  --ink:#111; --bg:#F4F2EE; --border:#D6D0C4; --muted:#6B6355;
  --white:#fff;
  --l1:#B45309; --l1-bg:#FEF3C7; --l1-bd:#FCD34D;
  --l2:#1D4ED8; --l2-bg:#DBEAFE; --l2-bd:#93C5FD;
  --l3:#B91C1C; --l3-bg:#FEE2E2; --l3-bd:#FCA5A5;
  --l4:#047857; --l4-bg:#D1FAE5; --l4-bd:#6EE7B7;
  --l5:#6D28D9; --l5-bg:#EDE9FE; --l5-bd:#C4B5FD;
  --l6:#0F766E; --l6-bg:#CCFBF1; --l6-bd:#5EEAD4;
  --loc-a:#1D4ED8; --loc-b:#047857;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; }
body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); overflow:hidden; -webkit-tap-highlight-color:transparent; }

/* ══ SETUP ══ */
.setup-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:500; padding:16px; }
.setup-overlay.hidden { display:none; }
.setup-card { background:var(--white); border:2px solid var(--border); border-radius:16px; padding:28px 24px; width:100%; max-width:420px; box-shadow:0 12px 48px rgba(0,0,0,.12); }
.setup-card h1 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); margin-bottom:4px; }
.setup-card p.sub { font-size:.88rem; color:var(--muted); margin-bottom:24px; }
.setup-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.13em; font-weight:700; color:var(--muted); margin-bottom:5px; display:block; }
.setup-input { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:9px; font-family:'DM Sans',sans-serif; font-size:1rem; color:var(--ink); background:var(--white); margin-bottom:20px; -webkit-appearance:none; }
.setup-input:focus { outline:none; border-color:#6B7280; }
.loc-options { display:flex; gap:10px; margin-bottom:24px; }
.loc-option { flex:1; padding:14px 8px; border:2px solid var(--border); border-radius:11px; cursor:pointer; text-align:center; background:var(--white); user-select:none; -webkit-tap-highlight-color:transparent; }
.loc-option .loc-icon { font-size:1.4rem; margin-bottom:4px; }
.loc-option .loc-name { font-weight:700; font-size:.88rem; }
.loc-option .loc-range { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--muted); }
.loc-option.selected-a { border-color:var(--loc-a); background:#EFF6FF; }
.loc-option.selected-b { border-color:var(--loc-b); background:#ECFDF5; }
.loc-option.selected-both { border-color:var(--gold); background:var(--gold-bg); }
.setup-btn { width:100%; padding:13px; background:var(--ink); color:#fff; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; -webkit-appearance:none; }
.setup-btn:disabled { background:#D1D5DB; }
.setup-err { color:#B91C1C; font-size:.8rem; margin-top:8px; text-align:center; min-height:18px; }

/* ══ APP SHELL ══ */
.app { display:none; flex-direction:column; height:100%; }

/* ── TOP BAR ── */
.top-bar {
  background:var(--white); border-bottom:2px solid var(--border);
  padding:10px 14px; display:flex; flex-direction:column; gap:8px;
  flex-shrink:0; position:sticky; top:0; z-index:50;
  box-shadow:0 1px 6px rgba(0,0,0,.07);
}
.top-bar-row1 { display:flex; align-items:center; gap:8px; }
.top-bar-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:900; color:var(--gold); flex:1; }
.operator-tag { font-size:.72rem; color:var(--muted); font-weight:500; }
.fb-status { display:flex; align-items:center; gap:3px; }
.fb-dot { width:6px; height:6px; border-radius:50%; background:#D1D5DB; flex-shrink:0; }
.fb-label { font-size:.6rem; font-weight:600; color:#9CA3AF; }
.fb-status.connected .fb-dot { background:#047857; animation:fbpulse 2s infinite; }
.fb-status.connected .fb-label { color:#047857; }
.fb-status.syncing .fb-dot { background:#D97706; }
.fb-status.syncing .fb-label { color:#D97706; }
.fb-status.error .fb-dot { background:#B91C1C; }
.fb-status.error .fb-label { color:#B91C1C; }
@keyframes fbpulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Total box */
.total-pill {
  background:var(--gold-bg); border:1.5px solid var(--gold-bd);
  border-radius:8px; padding:4px 12px; text-align:center; flex-shrink:0;
}
.total-pill-label { font-size:.52rem; text-transform:uppercase; letter-spacing:.12em; color:var(--gold); font-weight:700; display:block; }
.total-pill-val { font-family:'DM Mono',monospace; font-size:1.05rem; font-weight:700; color:var(--gold); }

/* ── LEVEL BUTTONS ROW ── */
.level-row {
  display:flex; gap:5px; overflow-x:auto; padding-bottom:2px;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.level-row::-webkit-scrollbar { display:none; }
.level-btn {
  font-family:'DM Mono',monospace; font-size:.82rem; font-weight:700;
  padding:8px 14px; border:2px solid #E5E7EB; border-left-width:4px;
  border-radius:8px; cursor:pointer; background:var(--white); color:var(--ink);
  white-space:nowrap; flex-shrink:0; position:relative;
  box-shadow:0 1px 3px rgba(0,0,0,.08); -webkit-appearance:none;
}
.level-btn::after {
  content:attr(data-count); position:absolute; top:-7px; right:-6px;
  background:var(--ink); color:#fff; font-size:.52rem; font-weight:700;
  width:15px; height:15px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .12s;
}
.level-btn[data-count]:not([data-count="0"])::after { opacity:1; }
.level-btn.active { transform:translateY(-1px); box-shadow:0 3px 10px rgba(0,0,0,.15); }
.level-btn.active.lvl-l1{background:var(--l1-bg);border-color:var(--l1);color:var(--l1);}
.level-btn.active.lvl-l2{background:var(--l2-bg);border-color:var(--l2);color:var(--l2);}
.level-btn.active.lvl-l3{background:var(--l3-bg);border-color:var(--l3);color:var(--l3);}
.level-btn.active.lvl-l4{background:var(--l4-bg);border-color:var(--l4);color:var(--l4);}
.level-btn.active.lvl-l5{background:var(--l5-bg);border-color:var(--l5);color:var(--l5);}
.level-btn.active.lvl-l6{background:var(--l6-bg);border-color:var(--l6);color:var(--l6);}

/* ── ACTIVE STATUS BAR ── */
.active-bar {
  padding:5px 10px; border-radius:7px; border:1.5px solid var(--border);
  font-size:.8rem; font-weight:500; background:var(--white);
  display:flex; align-items:center; gap:7px; min-height:34px;
  flex-shrink:0;
}
.active-bar.empty { color:var(--muted); font-style:italic; font-size:.78rem; justify-content:center; }
.active-bar strong { font-family:'DM Mono',monospace; font-size:.85rem; }
.active-bar .hint { margin-left:auto; font-size:.68rem; color:var(--muted); }

/* ── ACTION BTNS ROW ── */
.action-row { display:flex; gap:6px; flex-shrink:0; }
.undo-btn {
  flex:1; font-family:'DM Mono',monospace; font-size:.72rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.07em; padding:9px 12px;
  border:1.5px solid var(--ink); border-radius:8px; background:var(--ink); color:#fff;
  cursor:pointer; -webkit-appearance:none;
}
.reset-btn {
  flex:1; font-family:'DM Mono',monospace; font-size:.72rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.07em; padding:9px 12px;
  border:1.5px solid #FCA5A5; border-radius:8px; background:#FEF2F2; color:#B91C1C;
  cursor:pointer; -webkit-appearance:none;
}
.export-btn {
  flex:1; font-family:'DM Mono',monospace; font-size:.72rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.07em; padding:9px 12px;
  border:1.5px solid #047857; border-radius:8px; background:#D1FAE5; color:#047857;
  cursor:pointer; -webkit-appearance:none;
}

/* ── LOCATION TABS ── */
.loc-tab-bar {
  display:flex; gap:0; border-bottom:2px solid var(--border);
  flex-shrink:0; background:var(--bg);
}
.loc-tab {
  flex:1; padding:10px 8px; font-family:'DM Mono',monospace; font-size:.78rem; font-weight:700;
  text-align:center; cursor:pointer; color:var(--muted); border-bottom:3px solid transparent;
  margin-bottom:-2px; background:none; border-top:none; border-left:none; border-right:none;
  transition:all .15s; -webkit-appearance:none;
}
.loc-tab.active-a { color:var(--loc-a); border-bottom-color:var(--loc-a); background:var(--white); }
.loc-tab.active-b { color:var(--loc-b); border-bottom-color:var(--loc-b); background:var(--white); }

/* ── PADDLE AREA ── */
.paddle-area { flex:1; overflow:hidden; display:flex; min-height:0; }
.loc-pane { display:none; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 10px 16px; }
.loc-pane.active { display:block; }

/* Three col layout for loc A (many paddles), two col for B */
.loc-cols { display:flex; gap:0; height:100%; }
.hundreds-col { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; border-right:1px solid var(--border); padding:6px 6px 16px; }
.hundreds-col:last-child { border-right:none; }

.col-header-row { display:flex; align-items:center; gap:5px; margin-bottom:4px; }
.col-header { font-family:'DM Mono',monospace; font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#fff; padding:2px 6px; border-radius:3px; white-space:nowrap; flex-shrink:0; }
.col-header.loc-a { background:var(--loc-a); }
.col-header.loc-b { background:var(--loc-b); }
.col-header-line { flex:1; height:1px; background:var(--border); }

.digit-group { margin-bottom:4px; }
.digit-group-line { width:100%; height:1px; background:var(--border); margin-bottom:3px; }

.paddle-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(40px,1fr)); gap:3px; }
.paddle-btn {
  font-family:'DM Mono',monospace; font-size:.75rem; font-weight:700;
  aspect-ratio:1/1; border:1.5px solid #D1D5DB; border-radius:5px;
  background:var(--white); color:#374151; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  line-height:1; padding:0; -webkit-appearance:none; transition:all .1s;
  -webkit-tap-highlight-color:transparent;
}
.paddle-btn:active:not(.raised-any) { background:#F3F4F6; }
.paddle-btn.raised-any { cursor:default; }
.paddle-btn.raised-l1{background:var(--l1-bg);border-color:var(--l1);color:var(--l1);font-weight:800;}
.paddle-btn.raised-l2{background:var(--l2-bg);border-color:var(--l2);color:var(--l2);font-weight:800;}
.paddle-btn.raised-l3{background:var(--l3-bg);border-color:var(--l3);color:var(--l3);font-weight:800;}
.paddle-btn.raised-l4{background:var(--l4-bg);border-color:var(--l4);color:var(--l4);font-weight:800;}
.paddle-btn.raised-l5{background:var(--l5-bg);border-color:var(--l5);color:var(--l5);font-weight:800;}
.paddle-btn.raised-l6{background:var(--l6-bg);border-color:var(--l6);color:var(--l6);font-weight:800;}
.pip-row { display:flex; justify-content:center; gap:2px; margin-top:2px; height:4px; }
.pip { width:4px; height:4px; border-radius:50%; flex-shrink:0; }

/* ── SUMMARY SHEET (bottom drawer) ── */
.summary-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; }
.summary-backdrop.show { display:block; }
.summary-sheet {
  position:fixed; bottom:0; left:0; right:0; z-index:201;
  background:var(--white); border-radius:18px 18px 0 0;
  box-shadow:0 -8px 32px rgba(0,0,0,.15);
  transform:translateY(100%); transition:transform .3s ease;
  max-height:80vh; display:flex; flex-direction:column;
}
.summary-sheet.show { transform:translateY(0); }
.sheet-handle { width:40px; height:4px; background:#D1D5DB; border-radius:2px; margin:12px auto 8px; flex-shrink:0; }
.sheet-header { padding:0 16px 10px; border-bottom:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.sheet-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:900; color:var(--ink); }
.sheet-close { font-size:1.1rem; color:var(--muted); cursor:pointer; padding:4px; }
.sheet-body { overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; padding:8px 0 24px; }
.sheet-level { padding:8px 16px; border-bottom:1px solid #F0EDE8; border-left:3px solid transparent; }
.sheet-level-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.sheet-level-label { display:flex; align-items:center; gap:6px; font-size:.92rem; font-weight:700; }
.sheet-level-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sheet-level-sub { font-family:'DM Mono',monospace; font-size:.9rem; font-weight:700; }
.sheet-chips { display:flex; flex-wrap:wrap; gap:4px; }
.chip { font-family:'DM Mono',monospace; font-size:.78rem; font-weight:600; padding:2px 7px; border-radius:4px; cursor:pointer; border:1px solid transparent; line-height:1.5; -webkit-tap-highlight-color:transparent; }
.chip:active { filter:brightness(.85); }
.chip.empty-chip { color:#9CA3AF; font-style:italic; background:none!important; border:none!important; cursor:default; }
.chip.voided { opacity:.45; text-decoration:line-through; }
.chip-l1{background:var(--l1-bg);color:var(--l1);border-color:var(--l1-bd);}
.chip-l2{background:var(--l2-bg);color:var(--l2);border-color:var(--l2-bd);}
.chip-l3{background:var(--l3-bg);color:var(--l3);border-color:var(--l3-bd);}
.chip-l4{background:var(--l4-bg);color:var(--l4);border-color:var(--l4-bd);}
.chip-l5{background:var(--l5-bg);color:var(--l5);border-color:var(--l5-bd);}
.chip-l6{background:var(--l6-bg);color:var(--l6);border-color:var(--l6-bd);}

/* ── SUMMARY TABS (inside sheet) ── */
.sheet-tabs { display:flex; border-bottom:1.5px solid var(--border); flex-shrink:0; background:var(--bg); }
.sheet-tab {
  flex:1; padding:7px 0; font-size:.78rem; font-weight:600; text-align:center;
  cursor:pointer; color:var(--muted); border-bottom:2px solid transparent;
  margin-bottom:-1.5px; background:none; border-top:none; border-left:none; border-right:none;
  -webkit-appearance:none;
}
.sheet-tab.active-tab { color:var(--ink); border-bottom-color:var(--gold); background:var(--white); }

/* Summary button (FAB) */
.summary-fab {
  position:fixed; bottom:20px; right:16px; z-index:100;
  background:var(--ink); color:#fff;
  font-family:'DM Mono',monospace; font-size:.72rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.07em;
  padding:11px 16px; border-radius:30px; border:none; cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.3); -webkit-appearance:none;
  display:flex; align-items:center; gap:6px;
}
.fab-badge {
  background:var(--gold); color:var(--ink); font-size:.62rem; font-weight:800;
  padding:1px 6px; border-radius:10px; min-width:18px; text-align:center;
}

/* ── TOAST ── */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--ink); color:#fff; border-radius:8px; padding:9px 16px; font-size:.82rem; font-weight:500; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:999; transition:transform .22s ease; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300; align-items:flex-end; justify-content:center; padding:0; }
.modal-overlay.show { display:flex; }
.modal-card { background:var(--white); border-radius:18px 18px 0 0; padding:28px 24px 36px; width:100%; max-width:480px; box-shadow:0 -8px 32px rgba(0,0,0,.15); }
.modal-card h3 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--ink); margin-bottom:8px; }
.modal-card p { font-size:.88rem; color:var(--muted); margin-bottom:22px; line-height:1.5; }
.modal-btns { display:flex; gap:10px; }
.modal-btns button { flex:1; padding:13px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:700; cursor:pointer; border:1.5px solid var(--border); background:var(--white); color:var(--ink); -webkit-appearance:none; }
.modal-confirm { background:#FEF2F2!important; border-color:#FCA5A5!important; color:#B91C1C!important; }

/* ── DESKTOP ENHANCEMENT ── */
@media (min-width:768px) {
  .top-bar { flex-direction:row; align-items:center; padding:0 16px; height:56px; flex-wrap:wrap; gap:10px; }
  .top-bar > * { flex-shrink:0; }
  .level-row { flex-wrap:wrap; overflow:visible; }
  .active-bar { flex:1; min-width:200px; }
  .action-row { flex-wrap:nowrap; }
  .summary-fab { display:none; }
  /* On desktop show summary inline instead of FAB */
}
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup-overlay" id="setup-overlay">
  <div class="setup-card">
    <h1>🏆 Paddle Raise</h1>
    <p class="sub">Enter your name and select your location(s).</p>
    <label class="setup-label">Your Name</label>
    <input class="setup-input" id="operator-input" type="text" placeholder="e.g. Sarah Johnson" autocomplete="off">
    <label class="setup-label">Location(s)</label>
    <div class="loc-options">
      <div class="loc-option" id="opt-a" onclick="toggleLocOption('a')">
        <div class="loc-icon">🅰</div>
        <div class="loc-name">Loc A</div>
        <div class="loc-range">101–375</div>
      </div>
      <div class="loc-option" id="opt-b" onclick="toggleLocOption('b')">
        <div class="loc-icon">🅱</div>
        <div class="loc-name">Loc B</div>
        <div class="loc-range">376–450</div>
      </div>
      <div class="loc-option" id="opt-both" onclick="toggleLocOption('both')">
        <div class="loc-icon">🔀</div>
        <div class="loc-name">Both</div>
        <div class="loc-range">101–450</div>
      </div>
    </div>
    <button class="setup-btn" onclick="startApp()">Start Tracking</button>
    <div class="setup-err" id="setup-err"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-row1">
      <span class="top-bar-title">🏆 Paddle Raise</span>
      <span class="operator-tag" id="operator-tag"></span>
      <div class="fb-status" id="fb-status"><div class="fb-dot"></div><span class="fb-label" id="fb-label">–</span></div>
      <div class="total-pill">
        <span class="total-pill-label">Total</span>
        <span class="total-pill-val" id="total-val">$0</span>
      </div>
    </div>
    <!-- Level buttons -->
    <div class="level-row" id="level-buttons"></div>
    <!-- Active status + actions -->
    <div class="active-bar empty" id="active-bar">Select a giving level</div>
    <div class="action-row">
      <button class="undo-btn" onclick="undoLast()">↩ Undo</button>
      <button class="reset-btn" onclick="openReset()">Reset</button>
      <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
    </div>
  </div>

  <!-- Location tabs -->
  <div class="loc-tab-bar" id="loc-tab-bar"></div>

  <!-- Paddle area -->
  <div class="paddle-area" id="paddle-area"></div>

</div>

<!-- Summary FAB -->
<button class="summary-fab" id="summary-fab" onclick="openSummary()">
  📋 Summary <span class="fab-badge" id="fab-badge">0</span>
</button>

<!-- Summary sheet -->
<div class="summary-backdrop" id="summary-backdrop" onclick="closeSummary()"></div>
<div class="summary-sheet" id="summary-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Live Summary</span>
    <span class="sheet-close" onclick="closeSummary()">✕</span>
  </div>
  <div class="sheet-tabs" id="sheet-tabs"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- Reset modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <h3>Reset Everything?</h3>
    <p>This will clear all raised paddles. This cannot be undone.</p>
    <div class="modal-btns">
      <button onclick="closeReset()">Cancel</button>
      <button class="modal-confirm" onclick="confirmReset()">Yes, Reset</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
/* ════════ CONSTANTS ════════ */
const LEVELS = [
  { id:'l1', label:'$10,000', value:10000 },
  { id:'l2', label:'$5,000',  value:5000  },
  { id:'l3', label:'$2,500',  value:2500  },
  { id:'l4', label:'$1,000',  value:1000  },
  { id:'l5', label:'$500',    value:500   },
  { id:'l6', label:'$250',    value:250   },
];
const HEX = {
  l1:{ c:'#B45309', bg:'#FEF3C7', bd:'#FCD34D' },
  l2:{ c:'#1D4ED8', bg:'#DBEAFE', bd:'#93C5FD' },
  l3:{ c:'#B91C1C', bg:'#FEE2E2', bd:'#FCA5A5' },
  l4:{ c:'#047857', bg:'#D1FAE5', bd:'#6EE7B7' },
  l5:{ c:'#6D28D9', bg:'#EDE9FE', bd:'#C4B5FD' },
  l6:{ c:'#0F766E', bg:'#CCFBF1', bd:'#5EEAD4' },
};

function buildGroups(start, end) {
  const g=[]; let i=start;
  while(i<=end){const p=Math.floor(i/10),e=Math.min(p*10+9,end);g.push({prefix:p,start:i,end:e});i=e+1;}
  return g;
}

const LOC_CONFIG = {
  a: {
    cols: [
      { id:'a-1', label:'100s', groups:buildGroups(101,199) },
      { id:'a-2', label:'200s', groups:buildGroups(200,299) },
      { id:'a-3', label:'300s', groups:buildGroups(300,375) },
    ]
  },
  b: {
    cols: [
      { id:'b-1', label:'376–399', groups:buildGroups(376,399) },
      { id:'b-2', label:'400–424', groups:buildGroups(400,424) },
      { id:'b-3', label:'425–450', groups:buildGroups(425,450) },
    ]
  }
};

/* ════════ STATE ════════ */
let log = [];
let activeLevel = null;
let lastAction = null;
let toastTimer = null;
let operatorName = '';
let activeLocs = [];
let activeLocTab = null;
let activeSummaryTab = 'all';
let selectedLoc = null;

/* ════════ SETUP ════════ */
function toggleLocOption(loc) {
  selectedLoc = (selectedLoc === loc) ? null : loc;
  ['a','b','both'].forEach(l => {
    document.getElementById('opt-'+l).className = 'loc-option' + (l===selectedLoc ? ' selected-'+l : '');
  });
}

function startApp() {
  const name = document.getElementById('operator-input').value.trim();
  const err  = document.getElementById('setup-err');
  if (!name) { err.textContent='Please enter your name.'; return; }
  if (!selectedLoc) { err.textContent='Please select a location.'; return; }
  err.textContent='';
  operatorName = name;
  activeLocs = selectedLoc === 'both' ? ['a','b'] : [selectedLoc];
  document.getElementById('setup-overlay').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('app').style.height = '100%';
  initApp();
  if (window._fbInitSession) window._fbInitSession(operatorName, activeLocs);
}
document.getElementById('operator-input').addEventListener('keydown', e => { if(e.key==='Enter') startApp(); });

/* ════════ INIT ════════ */
function initApp() {
  document.getElementById('operator-tag').textContent = operatorName;

  // Level buttons
  const levelBtnsEl = document.getElementById('level-buttons');
  LEVELS.forEach(lvl => {
    const h = HEX[lvl.id];
    const btn = document.createElement('button');
    btn.className = 'level-btn lvl-'+lvl.id;
    btn.id = 'lvl-btn-'+lvl.id;
    btn.dataset.count = '0';
    btn.style.borderLeftColor = h.c;
    btn.textContent = lvl.label;
    btn.addEventListener('click', () => selectLevel(lvl.id));
    levelBtnsEl.appendChild(btn);
  });

  // Location tabs
  buildLocTabs();

  // Summary sheet tabs
  buildSheetTabs();
}

function buildLocTabs() {
  const bar = document.getElementById('loc-tab-bar');
  bar.innerHTML = '';
  activeLocs.forEach((loc, i) => {
    const btn = document.createElement('button');
    btn.className = 'loc-tab';
    btn.id = 'loc-tab-'+loc;
    btn.textContent = loc === 'a' ? 'Location A · 101–375' : 'Location B · 376–450';
    btn.addEventListener('click', () => switchLocTab(loc));
    bar.appendChild(btn);
    if (i === 0) { activeLocTab = loc; btn.classList.add('active-'+loc); }
  });
  if (activeLocs.length === 1) bar.style.display = 'none'; // hide tab bar if only one location
  buildPaddleArea();
}

function buildPaddleArea() {
  const area = document.getElementById('paddle-area');
  area.innerHTML = '';
  activeLocs.forEach((loc, i) => {
    const pane = document.createElement('div');
    pane.className = 'loc-pane' + (i===0 ? ' active' : '');
    pane.id = 'loc-pane-'+loc;
    const colsWrap = document.createElement('div');
    colsWrap.className = 'loc-cols';
    LOC_CONFIG[loc].cols.forEach(colDef => {
      const col = document.createElement('div');
      col.className = 'hundreds-col';
      // Header row
      const hdrRow = document.createElement('div');
      hdrRow.className = 'col-header-row';
      hdrRow.innerHTML = '<span class="col-header loc-'+loc+'">'+colDef.label+'</span><div class="col-header-line"></div>';
      col.appendChild(hdrRow);
      // Digit groups
      colDef.groups.forEach(g => {
        const wrap = document.createElement('div');
        wrap.className = 'digit-group';
        wrap.innerHTML = '<div class="digit-group-line"></div>';
        const grid = document.createElement('div');
        grid.className = 'paddle-grid';
        for (let n=g.start; n<=g.end; n++) {
          const btn = document.createElement('button');
          btn.className = 'paddle-btn';
          btn.id = 'p'+n;
          btn.innerHTML = n+'<div class="pip-row" id="pips-'+n+'"></div>';
          btn.addEventListener('click', () => togglePaddle(n));
          grid.appendChild(btn);
        }
        wrap.appendChild(grid);
        col.appendChild(wrap);
      });
      colsWrap.appendChild(col);
    });
    pane.appendChild(colsWrap);
    area.appendChild(pane);
  });
}

function buildSheetTabs() {
  const tabs = document.getElementById('sheet-tabs');
  tabs.innerHTML = '';
  const defs = [{ id:'all', label:'All' }];
  if (activeLocs.includes('a')) defs.push({ id:'a', label:'Loc A' });
  if (activeLocs.includes('b')) defs.push({ id:'b', label:'Loc B' });
  defs.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'sheet-tab' + (i===0?' active-tab':'');
    btn.textContent = t.label;
    btn.addEventListener('click', () => switchSheetTab(t.id, btn));
    tabs.appendChild(btn);
  });
}

/* ════════ LOC TAB SWITCH ════════ */
function switchLocTab(loc) {
  activeLocTab = loc;
  activeLocs.forEach(l => {
    const t = document.getElementById('loc-tab-'+l);
    if (t) t.className = 'loc-tab' + (l===loc?' active-'+l:'');
    const p = document.getElementById('loc-pane-'+l);
    if (p) p.className = 'loc-pane' + (l===loc?' active':'');
  });
}

/* ════════ LEVEL SELECT ════════ */
function selectLevel(id) {
  activeLevel = (activeLevel===id) ? null : id;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  const bar = document.getElementById('active-bar');
  if (activeLevel) {
    document.getElementById('lvl-btn-'+id).classList.add('active');
    const h=HEX[id], lvl=LEVELS.find(l=>l.id===id);
    bar.className='active-bar';
    bar.style.borderColor=h.bd; bar.style.background=h.bg;
    bar.innerHTML='<div class="level-dot" style="background:'+h.c+'"></div><strong style="color:'+h.c+'">'+lvl.label+'</strong><span class="hint">Tap paddle to raise · tap again to lower</span>';
  } else {
    bar.className='active-bar empty'; bar.style.borderColor=''; bar.style.background='';
    bar.innerHTML='Select a giving level';
  }
}

/* ════════ TOGGLE PADDLE ════════ */
function togglePaddle(num) {
  if (!activeLevel) { flashBar(); return; }
  const lvl = LEVELS.find(l=>l.id===activeLevel);
  if (isPaddleActive(num, activeLevel)) {
    const idx = [...log].reverse().findIndex(e=>e.num===num&&e.levelId===activeLevel&&!e.voided);
    const real = log.length-1-idx;
    log[real].voided = true;
    lastAction = { type:'void', logIdx:real };
    showToast('Paddle '+num+' removed from '+lvl.label);
  } else {
    log.push({ num, levelId:activeLevel, voided:false, ts:new Date() });
    lastAction = { type:'add', logIdx:log.length-1 };
    showToast('Paddle '+num+' raised at '+lvl.label+'!');
  }
  renderPaddle(num); renderTotals(); renderLevelCounts(); renderSummary();
  syncToFirebase();
}

/* ════════ STATE HELPERS ════════ */
function isPaddleActive(num, levelId) { return log.some(e=>e.num===num&&e.levelId===levelId&&!e.voided); }
function activeLevelsForPaddle(num) {
  const seen=new Set();
  return log.filter(e=>e.num===num&&!e.voided&&!seen.has(e.levelId)&&seen.add(e.levelId));
}
function activeEntries() { return log.filter(e=>!e.voided); }

/* ════════ RENDER PADDLE ════════ */
function renderPaddle(num) {
  const btn=document.getElementById('p'+num); if(!btn)return;
  LEVELS.forEach(l=>btn.classList.remove('raised-'+l.id));
  btn.classList.remove('raised-any');
  const pips=document.getElementById('pips-'+num); pips.innerHTML='';
  const lvls=activeLevelsForPaddle(num);
  if(lvls.length>0){
    btn.classList.add('raised-any');
    const dom=LEVELS.find(l=>lvls.some(e=>e.levelId===l.id));
    if(dom) btn.classList.add('raised-'+dom.id);
    const seen=new Set();
    lvls.forEach(e=>{
      if(!seen.has(e.levelId)){seen.add(e.levelId);
        const pip=document.createElement('div');
        pip.className='pip'; pip.style.background=HEX[e.levelId].c;
        pips.appendChild(pip);
      }
    });
  }
}

/* ════════ TOTALS ════════ */
function renderTotals() {
  const active=activeEntries();
  let total=0;
  LEVELS.forEach(l=>{total+=active.filter(e=>e.levelId===l.id).length*l.value;});
  document.getElementById('total-val').textContent='$'+total.toLocaleString();
  const raised=new Set(active.map(e=>e.num));
  document.getElementById('fab-badge').textContent=raised.size;
}

function renderLevelCounts() {
  LEVELS.forEach(lvl=>{
    const el=document.getElementById('lvl-btn-'+lvl.id);
    if(el) el.dataset.count=log.filter(e=>e.levelId===lvl.id&&!e.voided).length;
  });
}

/* ════════ SUMMARY SHEET ════════ */
function openSummary() {
  document.getElementById('summary-backdrop').classList.add('show');
  document.getElementById('summary-sheet').classList.add('show');
  renderSummary();
}
function closeSummary() {
  document.getElementById('summary-backdrop').classList.remove('show');
  document.getElementById('summary-sheet').classList.remove('show');
}
function switchSheetTab(id, el) {
  activeSummaryTab = id;
  document.querySelectorAll('.sheet-tab').forEach(b=>b.classList.remove('active-tab'));
  el.classList.add('active-tab');
  renderSummary();
}

function renderSummary() {
  const filterFn = activeSummaryTab==='all' ? ()=>true :
    activeSummaryTab==='a' ? n=>n>=101&&n<=375 : n=>n>=376&&n<=450;
  const body = document.getElementById('sheet-body');
  body.innerHTML='';
  LEVELS.forEach(lvl=>{
    const h=HEX[lvl.id];
    const entries=log.filter(e=>e.levelId===lvl.id&&filterFn(e.num));
    const active=entries.filter(e=>!e.voided).length;
    const subtotal=active*lvl.value;
    const div=document.createElement('div');
    div.className='sheet-level'; div.style.borderLeftColor=h.c;
    const chips=entries.length===0
      ?'<span class="chip empty-chip">none yet</span>'
      :entries.map((e,_)=>{
          const idx=log.indexOf(e);
          return '<span class="chip chip-'+lvl.id+(e.voided?' voided':'')+'" onclick="toggleVoidFromSummary('+idx+')" title="'+(e.voided?'Restore':'Remove')+'">'+e.num+'</span>';
        }).join('');
    div.innerHTML='<div class="sheet-level-head"><div class="sheet-level-label"><div class="sheet-level-dot" style="background:'+h.c+'"></div><span style="color:'+h.c+'">'+lvl.label+'</span></div><div class="sheet-level-sub" style="color:'+h.c+'">'+(subtotal>0?'$'+subtotal.toLocaleString():'—')+'</div></div><div class="sheet-chips">'+chips+'</div>';
    body.appendChild(div);
  });
}

function toggleVoidFromSummary(idx) {
  const e=log[idx]; e.voided=!e.voided;
  lastAction={type:e.voided?'void':'unvoid',logIdx:idx};
  const lvl=LEVELS.find(l=>l.id===e.levelId);
  showToast(e.voided?'Paddle '+e.num+' removed from '+lvl.label:'Paddle '+e.num+' restored to '+lvl.label);
  renderPaddle(e.num); renderTotals(); renderLevelCounts(); renderSummary();
  syncToFirebase();
}

/* ════════ UNDO ════════ */
function undoLast() {
  if(!lastAction)return;
  const e=log[lastAction.logIdx];
  if(lastAction.type==='add') e.voided=true;
  else if(lastAction.type==='void') e.voided=false;
  else if(lastAction.type==='unvoid') e.voided=true;
  lastAction=null;
  renderPaddle(e.num); renderTotals(); renderLevelCounts(); renderSummary();
  syncToFirebase();
}

/* ════════ EXPORT ════════ */
function exportCSV() {
  const rows=[['Operator','Paddle Number','Level','Amount','Timestamp','Status']];
  log.forEach(e=>{
    const lvl=LEVELS.find(l=>l.id===e.levelId);
    const ts=e.ts?e.ts.toLocaleString('en-US',{month:'2-digit',day:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}):'';
    rows.push([operatorName,e.num,lvl.label,lvl.value,ts,e.voided?'Removed':'Active']);
  });
  if(rows.length===1){showToast('No entries to export yet.');return;}
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const now=new Date();
  const stamp=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  a.href=url; a.download='paddle_raise_'+operatorName.replace(/\s+/g,'_')+'_'+stamp+'.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported!');
}

/* ════════ TOAST / FLASH / RESET ════════ */
function showToast(msg) {
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast').classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>document.getElementById('toast').classList.remove('show'),3000);
}

function flashBar() {
  const bar=document.getElementById('active-bar');
  bar.className='active-bar'; bar.style.borderColor='#FCA5A5'; bar.style.background='#FEF2F2';
  bar.innerHTML='<span style="color:#B91C1C;font-weight:600">⚠ Select a giving level first</span>';
  setTimeout(()=>{if(!activeLevel){bar.className='active-bar empty';bar.style.borderColor='';bar.style.background='';bar.innerHTML='Select a giving level';}},2200);
}

function openReset(){document.getElementById('modal').classList.add('show');}
function closeReset(){document.getElementById('modal').classList.remove('show');}
function confirmReset(){
  log=[];
  document.querySelectorAll('.paddle-btn').forEach(b=>renderPaddle(parseInt(b.id.slice(1))));
  activeLevel=null; selectLevel(null);
  renderTotals(); renderLevelCounts(); renderSummary(); closeReset();
  syncToFirebase();
}

/* ════════ FIREBASE SYNC ════════ */
function syncToFirebase() {
  if(!window._fbReady)return;
  window._fbSyncLog(log.map(e=>Object.assign({},e,{ts:e.ts?e.ts.toISOString():null})));
}
</script>
